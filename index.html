<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calduladora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="container">

        <header>
            <h3>Calculadora</h2>
        </header>

        <!-- Display da calculadora  -->
        <input type="text" id="display" readonly>

        <div class="teclas">

            <!-- Botões de números   --> 
            <button class="bnt bnt-estilo1 bnt-0">0</button>
            <button class="bnt bnt-estilo1 bnt-1">1</button>
            <button class="bnt bnt-estilo1 bnt-2">2</button>
            <button class="bnt bnt-estilo1 bnt-3">3</button>
            <button class="bnt bnt-estilo1 bnt-4">4</button>
            <button class="bnt bnt-estilo1 bnt-5">5</button>
            <button class="bnt bnt-estilo1 bnt-6">6</button>
            <button class="bnt bnt-estilo1 bnt-7">7</button>
            <button class="bnt bnt-estilo1 bnt-8">8</button>
            <button class="bnt bnt-estilo1 bnt-9">9</button>

            <!-- Operadores   -->
            <button class="bnt bnt-estilo2 bnt-igual">=</button>
            <button class="bnt bnt-estilo2 bnt-adição">+</button>
            <button class="bnt bnt-estilo2 bnt-menos">-</button>
            <button class="bnt bnt-estilo2 bnt-vezes">x</button>
            <button class="bnt bnt-estilo2 bnt-porcentagem">%</button>
            <button class="bnt bnt-estilo2 bnt-divisão">÷</button>

            <!-- Outros     -->
            <button class="bnt bnt-estilo1 bnt-virgula">,</button>
            <button class="bnt bnt-estilo2 bnt-ac">AC</button>
            <button class="bnt bnt-estilo1 bnt-apagar">⌫</button>
            <button class="bnt bnt-estilo2 bnt-parenteses">()</button>



        </div>


    </div>

</body>
</html>
